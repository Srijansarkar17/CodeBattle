# ══════════════════════════════════════════════════════════════════════════════
# CodeBattle — Docker Compose
# Spins up: PostgreSQL + Redis + FastAPI backend + Next.js frontend
# ══════════════════════════════════════════════════════════════════════════════

name: codebattle

services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: codebattle_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: codebattle
      POSTGRES_PASSWORD: codebattle_password
      POSTGRES_DB: codebattle_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codebattle -d codebattle_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codebattle_network

  # ── Redis Cache & Queue ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: codebattle_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codebattle_network

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codebattle_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://codebattle:codebattle_password@postgres:5432/codebattle_db
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
      DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app         # Hot-reload in dev (remove in prod)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - codebattle_network

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codebattle_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app         # Hot-reload in dev
      - /app/node_modules       # Prevent host node_modules from overwriting
      - /app/.next
    networks:
      - codebattle_network

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  codebattle_network:
    driver: bridge
